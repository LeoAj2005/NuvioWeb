name: Build webOS IPK

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-webos:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build || true

      - name: Package webOS IPK
        run: npm run package:webos

      - name: Verify package exists
        run: |
          ls -lah
          find . -name "*.ipk"

      # ===== NEW: Normalize IPK and update apps.json =====
      - name: Normalize package
        run: |
          FILE=$(find . -name "*.ipk" | head -1)
          mv "$FILE" NuvioTV.ipk
          SHA=$(sha256sum NuvioTV.ipk | cut -d' ' -f1)
          SIZE=$(wc -c < NuvioTV.ipk)
          sed -i "s|\"version\": \".*\"|\"version\": \"${GITHUB_RUN_NUMBER}\"|" webosbrew/apps.json
          sed -i "s|\"ipkSize\": .*|\"ipkSize\": ${SIZE},|" webosbrew/apps.json
          sed -i "s|\"sha256\": \".*\"|\"sha256\": \"${SHA}\"|" webosbrew/apps.json

      - name: Upload IPK artifact
        uses: actions/upload-artifact@v4
        with:
          name: webos-ipk
          path: NuvioTV.ipk          # fixed filename

      - name: Create auto release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: auto-build-${{ github.run_number }}
          files: NuvioTV.ipk          # fixed filename
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ===== NEW: Commit & push the updated apps.json =====
      - name: Push updated apps.json
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add webosbrew/apps.json
          git commit -m "Update apps.json for build ${{ github.run_number }} [skip ci]"
          git push